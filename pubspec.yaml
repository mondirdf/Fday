name: fday
description: A minimal offline daily awareness app.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  intl: ^0.19.0

dev_dependencies:
  flutter_launcher_icons: ^0.13.1

flutter:
  uses-material-design: true
  assets:
    - assets/تصميم بدون عنوان (23).png

flutter_icons:
  android: true
  image_path: "assets/تصميم بدون عنوان (23).png"
